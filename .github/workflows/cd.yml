name: CD

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/observability

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: collector
            dockerfile: Dockerfile.collector
          - name: query
            dockerfile: Dockerfile.query
          - name: alertmanager
            dockerfile: Dockerfile.alertmanager

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ build-and-push ]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Extract version tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Deploy collector
        run: |
          echo "Deploying observability-collector:${{ steps.version.outputs.version }}"
          # kubectl set image deployment/collector collector=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-collector:${{ steps.version.outputs.version }}

      - name: Deploy query service
        run: |
          echo "Deploying observability-query:${{ steps.version.outputs.version }}"
          # kubectl set image deployment/query query=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-query:${{ steps.version.outputs.version }}

      - name: Deploy alertmanager
        run: |
          echo "Deploying observability-alertmanager:${{ steps.version.outputs.version }}"
          # kubectl set image deployment/alertmanager alertmanager=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-alertmanager:${{ steps.version.outputs.version }}
