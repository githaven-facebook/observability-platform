name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./tests/unit/... ./internal/... -v -race -coverprofile=coverage.out -timeout 5m

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build collector
        run: go build -trimpath -ldflags="-s -w" -o bin/collector ./cmd/collector/...

      - name: Build query
        run: go build -trimpath -ldflags="-s -w" -o bin/query ./cmd/query/...

      - name: Build alertmanager
        run: go build -trimpath -ldflags="-s -w" -o bin/alertmanager ./cmd/alertmanager/...

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [ build ]
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        ports:
          - 9000:9000
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run integration tests
        env:
          INTEGRATION_TESTS: "1"
          CLICKHOUSE_DSN: "clickhouse://default:@localhost:9000/default"
        run: go test ./tests/integration/... -v -timeout 10m
