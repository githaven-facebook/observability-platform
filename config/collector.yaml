collector:
  otlp:
    grpc_port: 4317
    http_port: 4318
    bind_addr: "0.0.0.0"
  batch_size: 1000
  export_timeout: 30s
  sampling:
    head_sample_rate: 1.0
    tail_sample_rate: 0.1
    service_rates:
      high-volume-service: 0.1
      low-volume-service: 1.0
    always_sample_errors: true

storage:
  clickhouse_dsn: "clickhouse://default:@clickhouse:9000/default"
  retention_days: 7
  table_prefix: ""
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 5m
  dial_timeout: 10s

kafka:
  brokers:
    - "kafka:29092"
  traces_topic: "observability.traces"
  logs_topic: "observability.logs"
  metrics_topic: "observability.metrics"
  consumer_group: "observability-collector"
  commit_interval: 1s
  max_bytes: 10485760

alerting:
  evaluation_interval: 30s
  rules_file: "/etc/observability/alert-rules.yaml"

query:
  port: 8080
  bind_addr: "0.0.0.0"
  max_query_duration: 30s
  cache_ttl: 5m
  max_result_rows: 10000
