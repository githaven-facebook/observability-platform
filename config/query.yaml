storage:
  clickhouse_dsn: "clickhouse://default:@clickhouse:9000/default"
  retention_days: 7
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 5m
  dial_timeout: 10s

kafka:
  brokers:
    - "kafka:29092"
  traces_topic: "observability.traces"
  logs_topic: "observability.logs"
  metrics_topic: "observability.metrics"
  consumer_group: "observability-query"

alerting:
  evaluation_interval: 30s

query:
  port: 8080
  bind_addr: "0.0.0.0"
  max_query_duration: 30s
  cache_ttl: 5m
  max_result_rows: 10000
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s
