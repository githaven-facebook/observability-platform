groups:
  - name: service_health
    interval: 30s
    rules:
      - name: high_error_rate
        expression: "rate(http_requests_total{status=~\"5..\"}[5m]) / rate(http_requests_total[5m])"
        duration: 5m
        severity: critical
        enabled: true
        labels:
          team: platform
          env: production
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate exceeds 5% for {{ $labels.service }} for more than 5 minutes."
          runbook: "https://wiki.internal/runbooks/high-error-rate"
        conditions:
          - type: threshold
            operator: ">"
            threshold: 0.05
        notification_channels:
          - pagerduty
          - slack

      - name: high_latency_p99
        expression: "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))"
        duration: 10m
        severity: warning
        enabled: true
        labels:
          team: platform
          env: production
        annotations:
          summary: "High p99 latency detected"
          description: "p99 latency exceeds 2s for {{ $labels.service }}."
          runbook: "https://wiki.internal/runbooks/high-latency"
        conditions:
          - type: threshold
            operator: ">"
            threshold: 2.0
        notification_channels:
          - slack

      - name: service_down
        expression: "up"
        duration: 2m
        severity: critical
        enabled: true
        labels:
          team: platform
          env: production
        annotations:
          summary: "Service is down"
          description: "{{ $labels.service }} has been unreachable for more than 2 minutes."
          runbook: "https://wiki.internal/runbooks/service-down"
        conditions:
          - type: absence
        notification_channels:
          - pagerduty
          - slack
          - email

  - name: infrastructure
    interval: 60s
    rules:
      - name: high_disk_usage
        expression: "disk_used_bytes / disk_total_bytes"
        duration: 15m
        severity: warning
        enabled: true
        labels:
          team: infra
          env: production
        annotations:
          summary: "Disk usage above 85%"
          description: "Disk usage on {{ $labels.host }} is {{ $value | humanizePercentage }}."
          runbook: "https://wiki.internal/runbooks/disk-usage"
        conditions:
          - type: threshold
            operator: ">"
            threshold: 0.85
        notification_channels:
          - slack

      - name: clickhouse_insert_errors
        expression: "rate(clickhouse_insert_errors_total[5m])"
        duration: 5m
        severity: critical
        enabled: true
        labels:
          team: platform
          env: production
        annotations:
          summary: "ClickHouse insert errors detected"
          description: "ClickHouse is experiencing insert errors. Data may be lost."
          runbook: "https://wiki.internal/runbooks/clickhouse-errors"
        conditions:
          - type: threshold
            operator: ">"
            threshold: 0
        notification_channels:
          - pagerduty
          - slack
